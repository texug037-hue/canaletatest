<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><meta name="mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><meta name="apple-mobile-web-app-title" content="Canaleta"><meta name="theme-color" content="#070b12"><link rel="manifest" href="manifest.json"><link rel="apple-touch-icon" href="icon-192.png"><link rel="icon" href="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" type="image/gif" sizes="1x1"><title>Canaleta</title><meta name="theme-color" content="#070b12"><meta name="msapplication-TileImage" content="icon-192.png"><meta name="msapplication-TileColor" content="#070b12"><style>*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}html,body{height:100%;background:#070b12;overflow:hidden;}#root{height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:none;touch-action:pan-y;}input,textarea,button{font-family:"Courier New",Courier,monospace;-webkit-appearance:none;appearance:none;}input:focus,textarea:focus{outline:none;}button:active{opacity:.85;}::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-track{background:#0d1117;}::-webkit-scrollbar-thumb{background:#2a3450;border-radius:3px;}#splash{position:fixed;inset:0;background:#070b12;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .5s;}#splash.out{opacity:0;pointer-events:none;}.logo{font-size:52px;font-weight:900;color:#e0e8ff;font-family:"Courier New",monospace;letter-spacing:-.02em;text-shadow:0 0 60px #4a8aff44;margin-bottom:8px;}.sub{font-size:11px;color:#3a5a7a;letter-spacing:.2em;text-transform:uppercase;margin-bottom:36px;}.dots{display:flex;gap:8px;}.dot{width:8px;height:8px;border-radius:50%;background:#00e5a0;animation:dp 1.2s infinite;}.dot:nth-child(2){animation-delay:.2s;}.dot:nth-child(3){animation-delay:.4s;}@keyframes dp{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}#ibar{display:none;position:fixed;bottom:0;left:0;right:0;background:#0a1220;border-top:2px solid #00e5a033;padding:12px 16px;align-items:center;gap:12px;z-index:1000;}</style></head><body><div id="splash"><div class="logo">CANALETA</div><div class="sub">Monitoramento Industrial</div><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div><div id="root"></div><div id="ibar"><div style="flex:1"><div style="font-size:13px;font-weight:700;color:#e0e8ff;font-family:monospace">Instalar Canaleta</div><div style="font-size:11px;color:#5a6a8a;font-family:monospace;margin-top:2px">Adicionar à tela inicial</div></div><button onclick="doInstall()" style="background:linear-gradient(135deg,#1a3a2a,#2a6a4a);border:1px solid #00e5a055;color:#e0fff0;border-radius:10px;padding:10px 18px;font-size:13px;font-weight:700;cursor:pointer;">↓ Instalar</button><button onclick="document.getElementById('ibar').style.display='none'" style="background:transparent;border:none;color:#5a6a8a;font-size:22px;cursor:pointer;">✕</button></div><script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin="anonymous"></script><script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin="anonymous"></script><script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js" crossorigin="anonymous"></script><script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js" crossorigin="anonymous"></script><script>

if("serviceWorker" in navigator){
  const isSecure = location.protocol==="https:" || location.hostname==="localhost";
  if(isSecure){
    navigator.serviceWorker.register("sw.js", {scope:"/"})
      .then(r=>console.log("SW ok:",r.scope))
      .catch(e=>console.warn("SW erro:",e));
  }

let dp=null;
window.addEventListener("beforeinstallprompt",e=>{
  e.preventDefault();
  dp=e;
  window._dp=e;
  document.getElementById("ibar").style.display="flex";
});
window.addEventListener("appinstalled",()=>{
  document.getElementById("ibar").style.display="none";
});
function doInstall(){
  if(dp){dp.prompt();dp.userChoice.then(r=>{dp=null;window._dp=null;});}
  document.getElementById("ibar").style.display="none";
}
