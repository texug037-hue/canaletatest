if("serviceWorker" in navigator){
  try{
    // SW inline via data URL não funciona em todos os contextos
    // Vamos registrar apenas quando for HTTPS ou localhost (não arquivo local)
    const isSecure = location.protocol === "https:" || location.hostname === "localhost" || location.hostname === "127.0.0.1";
    if(isSecure){
      const swCode = `
const CACHE="canaleta-v39";
self.addEventListener("install",e=>{
  self.skipWaiting();
  e.waitUntil(caches.open(CACHE).then(c=>c.addAll(["/"])));
});
self.addEventListener("activate",e=>{
  e.waitUntil(Promise.all([
    clients.claim(),
    caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==CACHE).map(k=>caches.delete(k))))
  ]));
});
self.addEventListener("fetch",e=>{
  if(e.request.method!=="GET")return;
  e.respondWith(
    caches.match(e.request).then(r=>{
      if(r)return r;
      return fetch(e.request).then(res=>{
        if(!res||res.status!==200||res.type!=="basic")return res;
        const c=res.clone();
        caches.open(CACHE).then(ca=>ca.put(e.request,c));
        return res;
      }).catch(()=>caches.match("/"));
    })
  );
});`;
      try{
        const b=new Blob([swCode],{type:"application/javascript"});
        const swUrl=URL.createObjectURL(b);
        navigator.serviceWorker.register(swUrl,{scope:"/"}).then(reg=>{
          console.log("SW registrado:",reg.scope);
        }).catch(e=>console.warn("SW erro:",e));
      }catch(e){console.warn("SW blob falhou:",e);}
    }
  }catch(e){console.warn("SW falhou:",e);}
}
